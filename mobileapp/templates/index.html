<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    {% load static%} 
    <link rel = "stylesheet" href = "{% static "css/style.css" %}">
    
</head>
<body>
    
<div class="root">
  <header class="header">
    <div class="logo">CINESCOPE</div>
    {% if user.is_authenticated%}
    <span style='color:white;'>Hi {{user.username}}</span>
    <a href = "/logout/">Logout</a>
    {% else %}
    <a href = 'login/'>Login </a>
    <a href = 'register/'>Register</a>
    {% endif%}
    <span style="font-size:11px; letter-spacing:2px; color:rgba(255,255,255,0.25); text-transform:uppercase;">Movie Discovery</span>
  </header>

  <div class="search-section">
    <div class="search-headline">Find Your Film</div>
    <div class="search-sub">Search from millions of titles</div>
    <form action="" onsubmit="moviesearch(event)">
    <input type="text" name="" id="search">
    <button type="submit"  >Search</button>
    </form>
    <div id="container">
        <h1 id="title"></h1>
        <p id="plot"></p>
        <h2 id="rating"></h2>
        <h2 id="boxoffice"></h2>
        <h2 id="genre"></h2>
        <img src="" alt="" id="poster">
    </div>
   
    </div>
  </div>
</div>

 <div class="modal fade" id="movieModal" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered modal-dialog-scrollable">
    <div class="modal-content" style="
      background: linear-gradient(135deg, #0d001a, #000d1a);
      border: 1px solid rgba(180,50,255,0.3);
      border-radius: 16px;
      color: #fff;
      overflow: hidden;
    ">

      <div class="modal-header" style="
        border-bottom: 1px solid rgba(255,255,255,0.08);
        padding: 1rem 1.25rem;
        background: rgba(255,255,255,0.03);
      ">
        <h5 class="modal-title" id="modalTitle" style="
          font-family: 'Bebas Neue', sans-serif;
          font-size: 22px;
          letter-spacing: 2px;
          background: linear-gradient(90deg, #bf00ff, #ff0080);
          -webkit-background-clip: text;
          -webkit-text-fill-color: transparent;
          background-clip: text;
        "></h5>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal">X</button>
      </div>

      <div class="modal-body" style="padding: 1.25rem; display: flex; flex-direction: column; gap: 1rem;">
        <img id="modalPoster" style="
          width: 100%;
          border-radius: 10px;
          object-fit: cover;
          max-height: 280px;
          border: 1px solid rgba(255,255,255,0.08);
        " />

        <p id="modalPlot" style="
          font-size: 13px;
          line-height: 1.7;
          color: rgba(255,255,255,0.55);
          margin: 0;
        "></p>

        <div style="display: flex; flex-wrap: wrap; gap: 8px;">
          <p id="modalGenre" style="
            margin: 0;
            font-size: 12px;
            font-weight: 600;
            padding: 5px 12px;
            border-radius: 20px;
            background: rgba(139,0,255,0.18);
            border: 1px solid rgba(139,0,255,0.4);
            color: #d97dff;
          "></p>

          <p id="modalRating" style="
            margin: 0;
            font-size: 12px;
            font-weight: 600;
            padding: 5px 12px;
            border-radius: 20px;
            background: rgba(255,180,0,0.15);
            border: 1px solid rgba(255,180,0,0.35);
            color: #ffd166;
          "></p>

          <p id="modalBoxOffice" style="
            margin: 0;
            font-size: 12px;
            font-weight: 600;
            padding: 5px 12px;
            border-radius: 20px;
            background: rgba(0,220,130,0.12);
            border: 1px solid rgba(0,220,130,0.3);
            color: #4dffc3;
          "></p>
          <hr style = 'opacity:0.2'>
          <div style = 'margin-top:10px'>
            <h6> Rate this Movie</h6>

            <input type ='hidden' id='ratingInput' min='1' max='5'>
            <div class="speedometer-wrap">
  <div class="speedometer-label">Your Rating</div>
  <div class="speedo-svg-wrap">
    <svg viewBox="0 0 180 100" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <linearGradient id="arcGrad" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%" style="stop-color:#00e5ff"/>
          <stop offset="50%" style="stop-color:#bf00ff"/>
          <stop offset="100%" style="stop-color:#ff0080"/>
        </linearGradient>
      </defs>
      <path d="M 20 90 A 70 70 0 0 1 160 90" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="10" stroke-linecap="round"/>
      <path id="speedoArc" d="M 20 90 A 70 70 0 0 1 160 90" fill="none" stroke="url(#arcGrad)" stroke-width="10" stroke-linecap="round" stroke-dasharray="220" stroke-dashoffset="220"/>
      <line id="speedoNeedle" x1="90" y1="90" x2="90" y2="30" stroke="#fff" stroke-width="2.5" stroke-linecap="round" transform="rotate(0, 90, 90)" opacity="0.9"/>
      <circle cx="90" cy="90" r="5" fill="#fff" opacity="0.9"/>
    </svg>
    <div class="speedo-value" id="speedoValue">-</div>
  </div>
  <div class="speedo-sub">out of 5</div>
</div>

<div class="star-row">
  <button class="star-btn" data-val="1" onclick="setRating(1)">★</button>
  <button class="star-btn" data-val="2" onclick="setRating(2)">★</button>
  <button class="star-btn" data-val="3" onclick="setRating(3)">★</button>
  <button class="star-btn" data-val="4" onclick="setRating(4)">★</button>
  <button class="star-btn" data-val="5" onclick="setRating(5)">★</button>
</div>


            <textarea id='reviewInput' placeholder = 'write review...'></textarea>

            <button onclick = 'submitReview()'> Submit</button>

            <div id="reviewsContainer">
  <h5>User Reviews</h5>
</div>
        </div>
      </div>

    </div>
  </div>
</div>
<script src = "{% static "js/script.js" %}"></script>
    
</body>
</html>
