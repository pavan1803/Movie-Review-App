{% block content%}
<!DOCTYPE html>
<html lang="en">
<head>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        <style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;600;700&display=swap');

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    min-height: 100vh;
    background:
      radial-gradient(ellipse at 15% 25%, rgba(180,0,255,0.4) 0%, transparent 45%),
      radial-gradient(ellipse at 85% 10%, rgba(255,0,100,0.35) 0%, transparent 45%),
      radial-gradient(ellipse at 55% 85%, rgba(0,150,255,0.3) 0%, transparent 50%),
      linear-gradient(135deg, #08000f 0%, #0b0018 50%, #000b18 100%);
    font-family: 'Inter', sans-serif;
    color: #fff;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 3rem 1rem;
  }

  .container { width: 100%; max-width: 440px; }

  .jumbotron {
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 18px;
    backdrop-filter: blur(14px);
    box-shadow: 0 24px 60px rgba(0,0,0,0.5), 0 0 0 1px rgba(180,50,255,0.08);
    padding: 2.8rem 2.5rem;
  }

  .jumbotron::before {
    content: 'LOGIN';
    display: block;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 36px;
    letter-spacing: 3px;
    text-align: center;
    background: linear-gradient(135deg, #ffffff 0%, rgba(180,100,255,0.95) 50%, #ff4db2 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 2rem;
  }

  label {
    color: rgba(255,255,255,0.6) !important;
    font-size: 12px !important;
    font-weight: 600 !important;
    letter-spacing: 1.5px !important;
    text-transform: uppercase !important;
    margin-bottom: 6px !important;
  }

  .form-control {
    background: rgba(255,255,255,0.06) !important;
    border: 1px solid rgba(255,255,255,0.12) !important;
    border-radius: 10px !important;
    color: #fff !important;
    font-family: 'Inter', sans-serif !important;
    font-size: 14px !important;
    padding: 11px 16px !important;
    transition: border-color 0.25s, box-shadow 0.25s;
  }

  .form-control:focus {
    background: rgba(255,255,255,0.08) !important;
    border-color: rgba(180,50,255,0.7) !important;
    box-shadow: 0 0 0 3px rgba(160,0,255,0.15) !important;
    color: #fff !important;
  }

  .form-control::placeholder { color: rgba(255,255,255,0.25) !important; }

  .form-text {
    color: rgba(255,255,255,0.28) !important;
    font-size: 11px !important;
  }

  .btn-primary {
    background: linear-gradient(135deg, #8b00ff, #ff0080) !important;
    border: none !important;
    color: #fff !important;
    font-family: 'Inter', sans-serif !important;
    font-size: 13px !important;
    font-weight: 700 !important;
    letter-spacing: 2px !important;
    text-transform: uppercase !important;
    padding: 12px 36px !important;
    border-radius: 50px !important;
    width: 100%;
    margin-top: 0.8rem;
    transition: opacity 0.2s, transform 0.15s, box-shadow 0.2s;
  }

  .btn-primary:hover {
    opacity: 0.88 !important;
    transform: translateY(-2px) !important;
    box-shadow: 0 8px 28px rgba(180,0,255,0.45) !important;
  }

  .btn-primary:active { transform: scale(0.97) !important; }
</style>
    </style>

</head>
<body>
    <div class="container">
        <div class="jumbotron">
    <form action = "{% url 'login' %}" method= "POST">
     {% csrf_token %}
  <div class="mb-3">
    <label for="username" class="form-label">UserName</label>
    <input type="text" class="form-control" name="username" aria-describedby="emailHelp">
    <div id="emailHelp" class="form-text">We'll never share your email with anyone else.</div>
  </div>
  <div class="mb-3">
    <label for="exampleInputPassword1" class="form-label">Password</label>
    <input type="password" class="form-control" name ="password">
  </div>
  
  <button type="submit" class="btn btn-primary">Submit</button>
</form>
</div>
    </div>
    
</body>
</html>
{% endblock %}
